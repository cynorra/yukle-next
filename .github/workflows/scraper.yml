name: Scraper & Blog Generator Cron Job

on:
  schedule:
    # Run the scraper every 6 hours
    - cron: '0 */6 * * *'
    # Run the blog generator daily at midnight
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine script to run
        id: run-selector
        run: |
          # If triggered by schedule, check the cron expression
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Daily cron '0 0 * * *' triggers blog generator
            if [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
              echo "script=blog-generator" >> $GITHUB_OUTPUT
            else
              echo "script=scraper" >> $GITHUB_OUTPUT
            fi
          else
            # Default for manual trigger: run scraper (or adjust as needed)
            echo "script=scraper" >> $GITHUB_OUTPUT
          fi

      - name: Run Scraper
        if: steps.run-selector.outputs.script == 'scraper'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCRAPER_SHIPPER_ID: ${{ secrets.SCRAPER_SHIPPER_ID }}
        run: node scripts/scraper.js --all

      - name: Run Blog Generator
        if: steps.run-selector.outputs.script == 'blog-generator'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCRAPER_SHIPPER_ID: ${{ secrets.SCRAPER_SHIPPER_ID }}
        run: node scripts/blog-generator.js
